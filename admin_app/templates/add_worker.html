<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div>
    <div class="card" style="width:1000px; margin-left:100px; margin-right:100px">
        <div class="card-body">
            <!--            <h4 class="card-title">Basic form elements</h4>-->
            <!--            <p class="card-description"> Basic form elements </p>-->
            <form class="forms-sample">
                <div class="form-group">
                    <label for="exampleInputName1">Username</label>
                    <input type="text" class="form-control" id="exampleInputName1" placeholder="Username" name="username">
                </div>
                <div class="form-group">
                    <label for="exampleInputEmail3">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail3" placeholder="Email">
                </div>
                <div class="form-group">
                    <label for="exampleInputEmail3">Mobile number</label>
                    <input type="tel" class="form-control" id="exampleInputMobile" placeholder="Mobile">
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword4">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword4" placeholder="Password">
                </div>
                <div class="form-group">
                    <label for="exampleSelectGender">Select category</label>
                    <select class="form-select" id="exampleSelectGender">
                        <option>-category-</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label> Upload ID </label>
                    <input type="file" name="img[]" class="file-upload-default">
                    <div class="input-group col-xs-12">
                        <input type="text" class="form-control file-upload-info" disabled=""
                               placeholder="Upload Image">
                        <span class="input-group-append">
                            <button class="file-upload-browse btn btn-primary" type="button">Upload</button>
                          </span>
                    </div>
                </div>
                <div class="form-group">
                    <label> Upload Professional ID </label>
                    <input type="file" name="img[]" class="file-upload-default">
                    <div class="input-group col-xs-12">
                        <input type="text" class="form-control file-upload-info" disabled=""
                               placeholder="Upload Image">
                        <span class="input-group-append">
                            <button class="file-upload-browse btn btn-primary" type="button">Upload</button>
                          </span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="exampleInputCity1">Enter working time here</label>
                    <input type="text" class="form-control" id="exampleWorking" placeholder="8 hours minimum">
                </div>
                <div class="form-group">
                    <label for="exampleInputCity1">Experience</label>
                    <input type="number" class="form-control" id="exampleExperience" placeholder="in years">
                </div>
                <div class="form-group">
                    <label for="exampleInputCity1">City</label>
                    <input type="text" class="form-control" id="exampleInputCity1" placeholder="Location">
                </div>
                <button type="submit" class="btn btn-primary me-2">Submit</button>
                <button class="btn btn-light">Cancel</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
{% endblock %}
