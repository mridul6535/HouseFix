<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOUSEFIX | Complete Job</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .completion-card {
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #dcfce7;
            color: #166534;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-success {
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 600;
        }

        .btn-outline-secondary {
            border-radius: 50px;
            padding: 10px 30px;
        }

        .alert-warning {
            border-radius: 14px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card completion-card p-4 p-md-5 bg-white">

                <div class="d-flex align-items-center mb-4">
                    <div class="icon-box me-3">
                        <i class="bi bi-check2-circle fs-3"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-1">Complete Service Request</h4>
                        <small class="text-muted">Confirm that the assigned work has been successfully
                            completed.</small>
                    </div>
                </div>

                <form method="POST" action="{% url 'work_completed' job_id=job.id %}" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Request ID</label>
                        <input type="text" class="form-control"
                               value="{{ job.id }}" disabled>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Client Name</label>
                        <input type="text" class="form-control"
                               value="{{ job.full_name }}" disabled>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Service Title</label>
                        <input type="text" class="form-control"
                               value="{{ job.problem_title }}" disabled>
                    </div>

                    <input type="hidden" name="status" value="completed">

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Location</label>
                        <input type="text" class="form-control"
                               value="{{ job.city }}" disabled>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Worker Service Fee</label>
                        <div class="input-group">
            <span class="input-group-text">
                <i class="bi bi-currency-dollar"></i>
            </span>
                            <input type="number"
                                   class="form-control"
                                   name="worker_fee"
                                   placeholder="Enter service amount"
                                   required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload Completion Image</label>
                        <input type="file"
                               class="form-control"
                               name="completion_image"
                               accept="image/*">
                        <small class="text-muted">
                            Attach a clear image as proof of completed work (JPG, PNG).
                        </small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Completion Notes (Optional)</label>
                        <textarea class="form-control" name="completion_notes" rows="4"
                                  placeholder="Describe the work performed..."></textarea>
                    </div>

                    <div class="alert alert-warning d-flex align-items-center">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Once confirmed, this job status will be updated to
                        <strong class="ms-1">Completed</strong>.
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'worker_dashboard' %}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle me-2"></i>
                            Confirm Completion
                        </button>
                    </div>
                </form>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
