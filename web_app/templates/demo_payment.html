<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
    <style>
        body {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
          background: linear-gradient(135deg, #f0f4f8, #d9e4ec);
          font-family: Arial, sans-serif;
        }
        .btn {
          padding: 14px 28px;
          font-size: 18px;
          font-weight: bold;
          color: #fff;
          background: #28a745;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
          transition: background 0.3s ease, transform 0.2s ease;
        }
        .btn:hover { background: #218838; transform: translateY(-2px); }
        .btn:active { background: #1e7e34; transform: translateY(1px); }
    </style>
</head>
<body>
<button id="rzp-button1" class="btn">Confirm Payment</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "rzp_test_0ib0jPwwZ7I1lT",
        "amount": "{{ pay_str }}",
        "currency": "INR",
        "name": "ElectroMart",
        "description": "Your description",
        "order_id": "{{ payment.id }}",   // ✅ corrected
        "prefill": {
            "name": "abc",
            "email": "abc@gmail.com"
        },
        "theme": {
            "color": "#F28B00"
        },
        "handler": function (response){
            alert("Payment successful! Payment ID: " + response.razorpay_payment_id);
            // TODO: send response.razorpay_payment_id to your backend for verification
        }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
</body>
</html>
